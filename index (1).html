<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>无水印解析</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

body {
    min-height: 100vh;
    background: linear-gradient(135deg, #f0f4ff 0%, #e6ecff 50%, #dce7ff 100%);
    position: relative;
    overflow-x: hidden;
    padding: 20px 16px;
    display: flex;
    align-items: flex-start;
    justify-content: center;
}

body::before {
    content: '';
    position: absolute;
    top: -10%;
    right: -10%;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(180, 190, 255, 0.4) 0%, rgba(255, 255, 255, 0) 70%);
    border-radius: 50%;
    z-index: 0;
}

body::after {
    content: '';
    position: absolute;
    bottom: -10%;
    left: -10%;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(200, 210, 255, 0.3) 0%, rgba(255, 255, 255, 0) 70%);
    border-radius: 50%;
    z-index: 0;
}

.glass-container {
    position: relative;
    z-index: 1;
    max-width: 480px;
    width: 100%;
    background: rgba(255, 255, 255, 0.25);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.4);
    border-radius: 32px;
    box-shadow: 0 20px 40px rgba(0, 20, 80, 0.1);
    padding: 32px 24px 40px;
}

h1 {
    font-size: 2.2rem;
    font-weight: 700;
    text-align: center;
    color: #1d2136;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
}

.subhead {
    text-align: center;
    font-size: 1rem;
    font-weight: 400;
    color: #545a77;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.3);
}

.platform-scroll {
    overflow-x: auto;
    white-space: nowrap;
    -webkit-overflow-scrolling: touch;
    margin-bottom: 28px;
    padding-bottom: 8px;
    scrollbar-width: none;
}

.platform-scroll::-webkit-scrollbar {
    display: none;
}

.badge-wrapper {
    display: inline-flex;
    gap: 10px;
}

.platform-badge {
    display: inline-flex;
    align-items: center;
    background: rgba(255, 255, 255, 0.35);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.4);
    border-radius: 20px;
    padding: 10px 18px;
    font-weight: 500;
    color: #1d2136;
    font-size: 0.95rem;
}

.input-area {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-bottom: 28px;
}

.input-area input {
    width: 100%;
    height: 56px;
    background: rgba(255, 255, 255, 0.4);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.45);
    border-radius: 28px;
    padding: 0 22px;
    font-size: 1.05rem;
    color: #1d2136;
    outline: none;
    transition: all 0.2s ease;
}

.input-area input::placeholder {
    color: rgba(84, 90, 119, 0.6);
}

.ios-btn {
    width: 100%;
    height: 56px;
    border: none;
    background: linear-gradient(135deg, #5e72e4 0%, #825ee4 100%);
    color: white;
    font-size: 1.1rem;
    font-weight: 600;
    border-radius: 28px;
    box-shadow: 0 8px 20px rgba(94, 114, 228, 0.3);
    cursor: pointer;
    transition: all 0.2s ease;
    touch-action: manipulation;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
}

.ios-btn:active {
    transform: scale(0.96);
    box-shadow: 0 4px 12px rgba(94, 114, 228, 0.3);
    opacity: 0.9;
}

.btn-group {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
}

.download-btn {
    background: linear-gradient(135deg, #25c26e 0%, #10b981 100%);
}

.audio-btn {
    background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
}

.steps-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(255, 255, 255, 0.3);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.4);
    border-radius: 24px;
    padding: 14px 18px;
    margin-bottom: 28px;
}

.step-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.9rem;
    font-weight: 500;
    color: #1d2136;
}

.step-dot {
    width: 28px;
    height: 28px;
    background: linear-gradient(135deg, #5e72e4 0%, #825ee4 100%);
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.85rem;
}

.features-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 28px;
}

.glass-card {
    background: rgba(255, 255, 255, 0.3);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.4);
    border-radius: 24px;
    padding: 20px 12px;
    text-align: center;
}

.result-card {
    padding: 18px;
    text-align: left;
    margin-bottom: 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
}

.result-header {
    display: flex;
    align-items: center;
    gap: 14px;
}

.result-thumb {
    width: 64px;
    height: 64px;
    background: rgba(255, 255, 255, 0.4);
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    flex-shrink: 0;
}

.tip-box {
    background: rgba(255, 255, 255, 0.3);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.4);
    border-radius: 18px;
    padding: 14px;
    font-size: 0.85rem;
    color: #545a77;
    text-align: center;
    line-height: 1.5;
}
</style>
</head>
<body>
<div class="glass-container">
    <h1>无水印解析</h1>
    <div class="subhead">抖音 · 小红书 · B站 · 快手 · TikTok</div>
    <div class="platform-scroll">
        <div class="badge-wrapper">
            <span class="platform-badge">🎵抖音</span>
            <span class="platform-badge">📕小红书</span>
            <span class="platform-badge">📺B站</span>
            <span class="platform-badge">🎬快手</span>
            <span class="platform-badge">🌍TikTok</span>
            <span class="platform-badge">🎵音频提取</span>
        </div>
    </div>
    <div class="input-area">
        <input type="text" id="videoUrl" placeholder="粘贴视频链接/分享口令">
        <button class="ios-btn" id="parseBtn">开始解析</button>
    </div>
    <div class="steps-bar">
        <div class="step-item"><span class="step-dot">1</span>复制链接</div>
        <span>→</span>
        <div class="step-item"><span class="step-dot">2</span>粘贴解析</div>
        <span>→</span>
        <div class="step-item"><span class="step-dot">3</span>保存文件</div>
    </div>
    <div class="features-grid">
        <div class="glass-card">
            <div class="feature-emoji">⚡</div>
            <div class="feature-title">秒级解析</div>
        </div>
        <div class="glass-card">
            <div class="feature-emoji">🎬</div>
            <div class="feature-title">原画质</div>
        </div>
        <div class="glass-card">
            <div class="feature-emoji">🎵</div>
            <div class="feature-title">音频提取</div>
        </div>
        <div class="glass-card">
            <div class="feature-emoji">📱</div>
            <div class="feature-title">全平台</div>
        </div>
    </div>
    <div id="result"></div>
    <div class="tip-box">
        📌 点击下载后，若直接播放，长按/右键保存到本地即可<br>仅供个人学习使用
    </div>
</div>

<script>
const parseBtn = document.getElementById('parseBtn');
const videoUrl = document.getElementById('videoUrl');
const resultBox = document.getElementById('result');

const apiList = [
    "https://api.obtaindown.com/api/parse?url=",
    "https://api.yyy001.com/api/videoparse?url=",
    "https://d-cn-01.qeq.icu/api/video/parse?url="
];

const corsProxy = "https://corsproxy.io/?";

function extractUrl(text) {
    const pattern = /https?:\/\/[^\s]+/;
    const match = text.match(pattern);
    return match ? match[0] : text.trim();
}

parseBtn.addEventListener('click', async () => {
    const url = videoUrl.value.trim();
    if (!url) {
        alert('请输入视频链接');
        return;
    }
    parseBtn.innerHTML = '解析中...';
    parseBtn.disabled = true;
    resultBox.innerHTML = '';

    const target = extractUrl(url);
    for (let api of apiList) {
        try {
            let res = await fetch(corsProxy + encodeURIComponent(api + encodeURIComponent(target)));
            let json = await res.json();
            let video = json.video_url || json.data?.video || json.url || json.data?.url || '';
            let audio = json.audio_url || json.data?.audio || json.music_url || json.data?.music || '';
            let title = json.title || json.data?.title || '解析成功';
            if (video) {
                resultBox.innerHTML = `
                <div class="glass-card result-card">
                    <div class="result-header">
                        <div class="result-thumb">🎥</div>
                        <div>
                            <div style="font-weight:600;">${title}</div>
                            <div style="color:#555;margin-top:4px;">无水印原画质</div>
                        </div>
                    </div>
                    <div class="btn-group">
                        <a href="${video}" target="_blank" class="ios-btn download-btn">下载视频</a>
                        ${audio ? `<a href="${audio}" target="_blank" class="ios-btn audio-btn">下载音频</a>` : ''}
                    </div>
                </div>`;
                parseBtn.innerHTML = '开始解析';
                parseBtn.disabled = false;
                return;
            }
        } catch (e) {}
    }
    resultBox.innerHTML = '<div style="padding:14px;background:#fff3;border-radius:20px;text-align:center;">解析失败，请换链接重试</div>';
    parseBtn.innerHTML = '开始解析';
    parseBtn.disabled = false;
});
</script>
</body>
</html>
